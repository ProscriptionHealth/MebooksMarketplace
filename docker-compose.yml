version: '3.8'

services:
  # Vector Search Backend
  vector-search-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - API_KEY=${API_KEY}
      - VECTOR_SEARCH_API_KEY=${VECTOR_SEARCH_API_KEY}
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./uploads:/tmp/mebooks-uploads
      - ./logs:/app/logs
      - ${GOOGLE_APPLICATION_CREDENTIALS}:${GOOGLE_APPLICATION_CREDENTIALS}:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  mebooks-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_VECTOR_SEARCH_API_URL=http://localhost:8000
      - REACT_APP_VECTOR_SEARCH_API_KEY=${VECTOR_SEARCH_API_KEY}
      - REACT_APP_API_KEY=${API_KEY}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      vector-search-api:
        condition: service_healthy
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # PostgreSQL for metadata storage (optional)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=mebooks
      - POSTGRES_USER=mebooks_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mebooks_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: 